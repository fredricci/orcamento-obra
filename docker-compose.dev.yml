version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: obra
      POSTGRES_PASSWORD: obra
      POSTGRES_DB: orcamento_obra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obra -d orcamento_obra"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      target: runtime
    environment:
      DATABASE_URL: postgresql+asyncpg://obra:obra@db:5432/orcamento_obra
      API_KEY: dev-api-key
      BASIC_AUTH_USER: admin
      BASIC_AUTH_PASSWORD: admin
      APP_ENV: development
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    name: orcamento_obra_postgres_data
