{% extends "base.html" %}
{% block title %}Previsto — Orçamento de Obra{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Orçamento Previsto</h1>
    <button onclick="document.getElementById('addItemForm').classList.toggle('hidden')"
            class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm hover:bg-blue-700">
        Adicionar Item
    </button>
</div>

<!-- Filters -->
<form class="bg-white rounded-lg shadow p-4 mb-6 grid grid-cols-2 md:grid-cols-4 gap-4" method="get" action="/previsto">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Grupo</label>
        <select name="group_id" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            <option value="">Todos</option>
            {% for g in groups %}
            <option value="{{ g.id }}" {% if filter_group == g.id|string %}selected{% endif %}>{{ g.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Prioridade</label>
        <select name="priority" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            <option value="">Todas</option>
            <option value="alta" {% if filter_priority == 'alta' %}selected{% endif %}>Alta</option>
            <option value="media" {% if filter_priority == 'media' %}selected{% endif %}>Média</option>
            <option value="baixa" {% if filter_priority == 'baixa' %}selected{% endif %}>Baixa</option>
        </select>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select name="status" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            <option value="">Todos</option>
            <option value="ideia" {% if filter_status == 'ideia' %}selected{% endif %}>💡 Ideia</option>
            <option value="orcado" {% if filter_status == 'orcado' %}selected{% endif %}>📋 Orçado</option>
            <option value="contratado" {% if filter_status == 'contratado' %}selected{% endif %}>✅ Contratado</option>
            <option value="concluido" {% if filter_status == 'concluido' %}selected{% endif %}>✔️ Concluído</option>
        </select>
    </div>
    <div class="flex items-end">
        <button type="submit" class="bg-gray-600 text-white px-4 py-2 rounded-md text-sm hover:bg-gray-700">Filtrar</button>
    </div>
</form>

<!-- Edit form (painel fixo, aparece abaixo dos filtros) -->
<div id="editItemPanel" class="hidden bg-yellow-50 border border-yellow-200 rounded-lg shadow p-4 mb-4">
    <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-gray-700">✏️ Editando item</h3>
        <button onclick="document.getElementById('editItemPanel').classList.add('hidden')"
                class="text-gray-400 hover:text-gray-600 text-sm">✕ Fechar</button>
    </div>
    <form id="editItemForm" hx-target="#itemsBody" hx-swap="innerHTML">
        <div class="grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Grupo</label>
                <select name="group_id" id="eiGroupId" required class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full">
                    {% for g in groups %}
                    <option value="{{ g.id }}">{{ g.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Fornecedor</label>
                <input type="text" name="supplier" id="eiSupplier" maxlength="120" placeholder="Fornecedor"
                       class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Descrição</label>
                <input type="text" name="description" id="eiDescription" placeholder="Descrição"
                       class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Prioridade</label>
                <select name="priority" id="eiPriority" required class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full">
                    <option value="alta">Alta</option>
                    <option value="media">Média</option>
                    <option value="baixa">Baixa</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Status</label>
                <select name="status" id="eiStatus" required class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full">
                    <option value="ideia">💡 Ideia</option>
                    <option value="orcado">📋 Orçado</option>
                    <option value="contratado">✅ Contratado</option>
                    <option value="concluido">✔️ Concluído</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Valor (R$)</label>
                <input type="number" name="planned_value" id="eiValue" step="0.01" min="0.01" required placeholder="0.00"
                       class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full">
            </div>
        </div>
        <div class="mt-3 flex gap-2">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm hover:bg-blue-700">Salvar</button>
            <button type="button" onclick="document.getElementById('editItemPanel').classList.add('hidden')"
                    class="text-gray-500 text-sm hover:underline">Cancelar</button>
        </div>
    </form>
</div>

<!-- Add form -->
<div id="addItemForm" class="hidden bg-white rounded-lg shadow p-4 mb-6">
    <form hx-post="/previsto" hx-target="#itemsBody" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful) this.reset()">
        <div class="grid grid-cols-1 md:grid-cols-6 gap-4">
            <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-1">Grupo <span class="text-red-500">*</span></label>
                <input type="hidden" name="group_id" id="addGroupId" required>
                <input type="text" id="addGroupSearch" required autocomplete="off" placeholder="Digite para buscar..."
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                <div id="addGroupDropdown" class="hidden absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-48 overflow-y-auto mt-1"></div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Fornecedor</label>
                <input type="text" name="supplier" maxlength="120" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                <input type="text" name="description" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            </div>
            <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-1">Prioridade <span class="text-red-500">*</span></label>
                <input type="hidden" name="priority" id="addPriorityId" required>
                <input type="text" id="addPrioritySearch" required autocomplete="off" placeholder="Digite..."
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                <div id="addPriorityDropdown" class="hidden absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-48 overflow-y-auto mt-1"></div>
            </div>
            <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-1">Status <span class="text-red-500">*</span></label>
                <input type="hidden" name="status" id="addStatusId" required>
                <input type="text" id="addStatusSearch" required autocomplete="off" placeholder="Digite..."
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                <div id="addStatusDropdown" class="hidden absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-48 overflow-y-auto mt-1"></div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Valor (R$) <span class="text-red-500">*</span></label>
                <input type="number" name="planned_value" step="0.01" min="0.01" required class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded-md text-sm hover:bg-green-700">Salvar</button>
        </div>
    </form>
</div>

<div class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="min-w-full text-sm">
        <thead class="bg-gray-50 border-b">
            <tr>
                <th class="text-left px-4 py-3 font-medium text-gray-600">Grupo</th>
                <th class="text-left px-4 py-3 font-medium text-gray-600">Fornecedor</th>
                <th class="text-left px-4 py-3 font-medium text-gray-600">Descrição</th>
                <th class="text-center px-4 py-3 font-medium text-gray-600">Prioridade</th>
                <th class="text-center px-4 py-3 font-medium text-gray-600">Status</th>
                <th class="text-right px-4 py-3 font-medium text-gray-600">Valor</th>
                <th class="text-center px-4 py-3 font-medium text-gray-600">Ações</th>
            </tr>
        </thead>
        <tbody id="itemsBody" class="divide-y divide-gray-100">
            {% include "partials/budget_items_rows.html" %}
        </tbody>
        <tfoot class="bg-gray-50 border-t font-semibold">
            <tr>
                <td colspan="5" class="px-4 py-3 text-right">Total:</td>
                <td class="px-4 py-3 text-right">R$ {{ total }}</td>
                <td></td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
const groupOptions = [
    {% for g in groups %}{ value: "{{ g.id }}", label: "{{ g.name }}" },{% endfor %}
];
const priorityOptions = [
    { value: "alta", label: "Alta" },
    { value: "media", label: "Média" },
    { value: "baixa", label: "Baixa" },
];
const statusOptions = [
    { value: "ideia", label: "💡 Ideia" },
    { value: "orcado", label: "📋 Orçado" },
    { value: "contratado", label: "✅ Contratado" },
    { value: "concluido", label: "✔️ Concluído" },
];

function setupAutocomplete(inputId, dropdownId, options, hiddenId) {
    const input = document.getElementById(inputId);
    const dd = document.getElementById(dropdownId);
    const hidden = document.getElementById(hiddenId);
    let activeIndex = -1;
    let filtered = [];

    function render() {
        dd.innerHTML = '';
        activeIndex = -1;
        const query = input.value.toLowerCase();
        filtered = options.filter(o => o.label.toLowerCase().includes(query));
        filtered.forEach((o, i) => {
            const div = document.createElement('div');
            div.className = 'px-3 py-2 text-sm cursor-pointer hover:bg-blue-100';
            div.textContent = o.label;
            div.onmousedown = (e) => { e.preventDefault(); select(i); };
            dd.appendChild(div);
        });
        dd.classList.toggle('hidden', filtered.length === 0);
    }

    function highlight(idx) {
        dd.querySelectorAll('div').forEach(d => d.classList.remove('bg-blue-100'));
        if (idx >= 0 && idx < filtered.length) {
            activeIndex = idx;
            dd.children[idx].classList.add('bg-blue-100');
            dd.children[idx].scrollIntoView({ block: 'nearest' });
        }
    }

    function select(idx) {
        if (idx >= 0 && idx < filtered.length) {
            input.value = filtered[idx].label;
            hidden.value = filtered[idx].value;
            dd.classList.add('hidden');
        }
    }

    input.addEventListener('input', () => { hidden.value = ''; render(); });
    input.addEventListener('focus', render);
    input.addEventListener('keydown', (e) => {
        if (dd.classList.contains('hidden')) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); highlight(activeIndex + 1 < filtered.length ? activeIndex + 1 : 0); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); highlight(activeIndex - 1 >= 0 ? activeIndex - 1 : filtered.length - 1); }
        else if (e.key === 'Enter') { e.preventDefault(); if (activeIndex >= 0) select(activeIndex); }
        else if (e.key === 'Escape') { dd.classList.add('hidden'); }
    });
    input.addEventListener('blur', () => { setTimeout(() => dd.classList.add('hidden'), 150); });
}

setupAutocomplete('addGroupSearch', 'addGroupDropdown', groupOptions, 'addGroupId');
setupAutocomplete('addPrioritySearch', 'addPriorityDropdown', priorityOptions, 'addPriorityId');
setupAutocomplete('addStatusSearch', 'addStatusDropdown', statusOptions, 'addStatusId');
</script>
{% endblock %}
