{% extends "base.html" %}
{% block title %}Grupos — Orçamento de Obra{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Grupos</h1>
    <button onclick="document.getElementById('addGroupForm').classList.toggle('hidden')"
            class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm hover:bg-blue-700">
        Adicionar Grupo
    </button>
</div>

<!-- Add form -->
<div id="addGroupForm" class="hidden bg-white rounded-lg shadow p-4 mb-6">
    <form hx-post="/grupos" hx-target="#groupsTable" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful) this.reset()">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome <span class="text-red-500">*</span></label>
                <input type="text" name="name" required maxlength="80" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Descrição <span class="text-gray-400 font-normal">(ajuda na classificação automática)</span></label>
                <input type="text" name="description" placeholder="Ex: Gastos com mão de obra, demolição, alvenaria e estrutura" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded-md text-sm hover:bg-green-700">Salvar</button>
        </div>
    </form>
</div>

<div class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="min-w-full text-sm">
        <thead class="bg-gray-50 border-b">
            <tr>
                <th class="text-left px-4 py-3 font-medium text-gray-600">Nome</th>
                <th class="text-left px-4 py-3 font-medium text-gray-600">Descrição</th>
                <th class="text-center px-4 py-3 font-medium text-gray-600">Ativo</th>
                <th class="text-center px-4 py-3 font-medium text-gray-600">Ações</th>
            </tr>
        </thead>
        <tbody id="groupsTable" class="divide-y divide-gray-100">
            {% include "partials/groups_rows.html" %}
        </tbody>
    </table>
</div>
{% endblock %}
