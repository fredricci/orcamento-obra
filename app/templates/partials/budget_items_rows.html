{% for item in items %}
<tr id="item-{{ item.id }}">
    <td class="px-4 py-2">{{ item.group_name }}</td>
    <td class="px-4 py-2">{{ item.supplier or '-' }}</td>
    <td class="px-4 py-2">{{ item.description }}</td>
    <td class="px-4 py-2 text-center">
        <span class="px-2 py-1 rounded text-xs font-medium {% if item.priority == 'alta' %}bg-red-100 text-red-700{% elif item.priority == 'media' %}bg-yellow-100 text-yellow-700{% else %}bg-green-100 text-green-700{% endif %}">
            {{ item.priority }}
        </span>
    </td>
    <td class="px-4 py-2 text-right">R$ {{ item.planned_value_fmt }}</td>
    <td class="px-4 py-2 text-center space-x-1">
        <button onclick="editItem('{{ item.id }}', '{{ item.group_id }}', '{{ item.supplier or '' }}', '{{ item.description }}', '{{ item.priority }}', '{{ item.planned_value }}')"
                class="text-blue-600 hover:underline text-xs">Editar</button>
        <button hx-delete="/previsto/{{ item.id }}" hx-target="#itemsBody" hx-swap="innerHTML"
                hx-confirm="Tem certeza que deseja excluir este item?"
                class="text-red-600 hover:underline text-xs">Excluir</button>
    </td>
</tr>
{% endfor %}

<!-- Inline edit row -->
<tr id="editItemRow" class="hidden bg-blue-50">
    <td colspan="6" class="px-4 py-3">
        <form id="editItemForm" hx-target="#itemsBody" hx-swap="innerHTML">
            <div class="grid grid-cols-1 md:grid-cols-6 gap-3 items-end">
                <select name="group_id" id="eiGroupId" required class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                    {% for g in groups %}
                    <option value="{{ g.id }}">{{ g.name }}</option>
                    {% endfor %}
                </select>
                <input type="text" name="supplier" id="eiSupplier" maxlength="120" placeholder="Fornecedor" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                <input type="text" name="description" id="eiDescription" required placeholder="Descrição" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                <select name="priority" id="eiPriority" required class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                    <option value="alta">Alta</option>
                    <option value="media">Média</option>
                    <option value="baixa">Baixa</option>
                </select>
                <input type="number" name="planned_value" id="eiValue" step="0.01" min="0.01" required class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                <div class="flex gap-2">
                    <button type="submit" class="bg-blue-600 text-white px-3 py-2 rounded-md text-xs hover:bg-blue-700">Salvar</button>
                    <button type="button" onclick="document.getElementById('editItemRow').classList.add('hidden')" class="text-gray-500 text-xs hover:underline">Cancelar</button>
                </div>
            </div>
        </form>
    </td>
</tr>

<script>
function editItem(id, groupId, supplier, description, priority, value) {
    document.getElementById('editItemRow').classList.remove('hidden');
    document.getElementById('eiGroupId').value = groupId;
    document.getElementById('eiSupplier').value = supplier;
    document.getElementById('eiDescription').value = description;
    document.getElementById('eiPriority').value = priority;
    document.getElementById('eiValue').value = value;
    const form = document.getElementById('editItemForm');
    form.setAttribute('hx-put', '/previsto/' + id);
    htmx.process(form);
}
</script>
