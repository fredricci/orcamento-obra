{% for txn in transactions %}
<tr id="txn-{{ txn.id }}">
    <td class="px-4 py-2 text-sm">{{ txn.date_fmt }}</td>
    <td class="px-4 py-2 text-sm">{{ txn.group_name }}</td>
    <td class="px-4 py-2 text-sm">{{ txn.supplier or '-' }}</td>
    <td class="px-4 py-2 text-sm">{{ txn.description or '-' }}</td>
    <td class="px-4 py-2 text-right text-sm">R$ {{ txn.value_fmt }}</td>
    <td class="px-4 py-2 text-center">
        <span class="px-2 py-1 rounded text-xs bg-gray-100 text-gray-700">{{ txn.payment_method or '-' }}</span>
    </td>
    <td class="px-4 py-2 text-center">
        <span class="px-2 py-1 rounded text-xs {% if txn.source == 'chat' %}bg-purple-100 text-purple-700{% else %}bg-gray-100 text-gray-700{% endif %}">{{ txn.source or '-' }}</span>
    </td>
    <td class="px-4 py-2 text-center whitespace-nowrap">
        <button onclick="editTxn('{{ txn.id }}', '{{ txn.group_id }}', '{{ txn.date_iso }}', '{{ (txn.supplier or '') }}', '{{ (txn.description or '') }}', '{{ txn.value_raw }}', '{{ txn.payment_method or 'pix' }}')"
                class="text-blue-600 hover:underline text-xs mr-2">Editar</button>
        <button hx-delete="/realizado/{{ txn.id }}" hx-target="#txnBody" hx-swap="innerHTML"
                hx-confirm="Tem certeza que deseja excluir este lançamento?"
                class="text-red-600 hover:underline text-xs">Excluir</button>
    </td>
</tr>
{% endfor %}

<script>
function editTxn(id, groupId, date, supplier, description, value, paymentMethod) {
    const panel = document.getElementById('editTxnPanel');
    panel.classList.remove('hidden');
    document.getElementById('etDate').value = date;
    document.getElementById('etGroupId').value = groupId;
    document.getElementById('etSupplier').value = supplier;
    document.getElementById('etDescription').value = description;
    document.getElementById('etValue').value = value;
    document.getElementById('etPayment').value = paymentMethod;
    const form = document.getElementById('editTxnForm');
    form.setAttribute('hx-put', '/realizado/' + id);
    htmx.process(form);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
